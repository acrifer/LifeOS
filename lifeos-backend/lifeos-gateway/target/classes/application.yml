server:
  port: ${LIFEOS_GATEWAY_PORT:8080}

spring:
  application:
    name: lifeos-gateway
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedHeaders: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
      discovery:
        locator:
          enabled: true # 开启从注册中心动态创建路由的功能
          lower-case-service-id: true
      routes:
        - id: lifeos-user-service-docs
          uri: lb://lifeos-user-service
          predicates:
            - Path=/service-docs/user
          filters:
            - SetPath=/v3/api-docs
        - id: lifeos-task-service-docs
          uri: lb://lifeos-task-service
          predicates:
            - Path=/service-docs/task
          filters:
            - SetPath=/v3/api-docs
        - id: lifeos-note-service-docs
          uri: lb://lifeos-note-service
          predicates:
            - Path=/service-docs/note
          filters:
            - SetPath=/v3/api-docs
        - id: lifeos-ai-service-docs
          uri: lb://lifeos-ai-service
          predicates:
            - Path=/service-docs/ai
          filters:
            - SetPath=/v3/api-docs
        - id: lifeos-behavior-service-docs
          uri: lb://lifeos-behavior-service
          predicates:
            - Path=/service-docs/behavior
          filters:
            - SetPath=/v3/api-docs
        - id: lifeos-user-service
          uri: lb://lifeos-user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: lifeos-task-service
          uri: lb://lifeos-task-service
          predicates:
            - Path=/api/task/**
          filters:
            - StripPrefix=1
        - id: lifeos-note-service
          uri: lb://lifeos-note-service
          predicates:
            - Path=/api/note/**
          filters:
            - StripPrefix=1
        - id: lifeos-ai-service
          uri: lb://lifeos-ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
        - id: lifeos-behavior-service
          uri: lb://lifeos-behavior-service
          predicates:
            - Path=/api/behavior/**
          filters:
            - StripPrefix=1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: 用户服务
        url: /service-docs/user
      - name: 笔记服务
        url: /service-docs/note
      - name: 任务服务
        url: /service-docs/task
      - name: AI 服务
        url: /service-docs/ai
      - name: 行为服务
        url: /service-docs/behavior
