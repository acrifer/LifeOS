server:
  port: ${LIFEOS_AI_SERVICE_PORT:8084}

spring:
  application:
    name: lifeos-ai-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR}
  producer:
    group: ${spring.application.name}-producer

lifeos:
  ai:
    base-url: ${LIFEOS_AI_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    api-key: ${LIFEOS_AI_API_KEY:LIFEOS_AI_API_KEY}
    model: ${LIFEOS_AI_MODEL:glm-4.5-air}
