dataSources:
  ds0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: ${MYSQL_JDBC_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
rules:
- !SHARDING
  tables:
    note:
      actualDataNodes: ds0.note_$->{0..3}
      tableStrategy:
        standard:
          shardingColumn: user_id
          shardingAlgorithmName: note_inline
  shardingAlgorithms:
    note_inline:
      type: INLINE
      props:
        algorithm-expression: note_$->{user_id % 4}
- !SINGLE
  tables:
    - ds0.ai_workflow_job
props:
  sql-show: true
