services:
  mysql:
    image: mysql:8.0.40
    container_name: lifeos-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-lifeos}"
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - lifeos_mysql_data:/var/lib/mysql
      - ./lifeos-backend/db/lifeos.sql:/docker-entrypoint-initdb.d/001-lifeos.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USERNAME:-root}", "-p${MYSQL_ROOT_PASSWORD:-123}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7.2
    container_name: lifeos-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lifeos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  lifeos_mysql_data:
  lifeos_redis_data:
